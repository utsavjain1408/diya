<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diya — Coming Soon</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
      }

      body {
        background-color: #0d0d0d;
        color: #f5f5f5;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }

      .container {
        text-align: center;
        max-width: 600px;
      }

      .label {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 1.5rem;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.02em;
        color: #ffffff;
        margin-bottom: 1.25rem;
      }

      h1 span {
        background: linear-gradient(90deg, #e8a045, #f0c070);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.7;
        color: #999;
      }

      .divider {
        width: 40px;
        height: 2px;
        background: linear-gradient(90deg, #e8a045, #f0c070);
        border: none;
        border-radius: 2px;
        margin: 2rem auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="label">Diya</p>
      <h1>Stay tuned.<br /><span>Something cool is coming.</span></h1>
      <hr class="divider" />
      <p>We're working on something great.<br />Check back soon.</p>
    </div>
  </body>
</html>
