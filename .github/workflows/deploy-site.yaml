name: "Deploy coming-soon site"
run-name: ${{ github.actor }} is deploying the static site to ${{ inputs.environment || 'development' }} 🌐
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy the static site to"
        required: true
        type: choice
        default: development
        options:
          - development
          - staging
          - production
  push:
    branches:
      - development
    paths:
      - "static/**"
      - ".github/workflows/deploy-site.yaml"
permissions:
  # id-token write required for OIDC, contents read required for actions/checkout
  id-token: write
  contents: read
env:
  AWS_REGION: ${{ vars.TF_VAR_REGION }}

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    # workflow_dispatch supplies the environment; push events default to development.
    environment:
      name: ${{ inputs.environment || 'development' }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.TF_VAR_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-session-name: GitHub-Actions-OIDC-SITE

      - name: Validate site bucket is configured
        run: |
          if [ -z "${{ vars.SITE_BUCKET }}" ]; then
            echo "::error::The SITE_BUCKET environment variable is not set for this environment."
            exit 1
          fi

      - name: Sync static site to S3
        run: |
          aws s3 sync ./static "s3://${{ vars.SITE_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront cache
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
